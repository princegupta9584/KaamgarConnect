<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 Available Jobs | KaamgarConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="sub-page">

    <header>
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🧰</span>
                <strong>Kaamgar<span>Connect</span></strong>
            </div>
            
            <nav id="mainNav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="jobs.html" class="nav-link active">Jobs</a>
                <a href="workers.html" class="nav-link">Workers</a>
                <a href="index.html#developers" class="nav-link">Team</a>
                <a href="index.html#contact" class="nav-link">Contact</a>
            </nav>

            <div class="auth-wrapper" id="authSection">
                <div id="guestLinks">
                    <button id="openLogin" class="btn-glass">Sign In</button>
                    <button id="openReg" class="btn-primary">Join Now</button>
                </div>

                <div id="userLinks" style="display: none; align-items: center; gap: 20px;">
                    <div class="user-info-mini" style="text-align: right;">
                        <span id="welcomeUser" style="display: block; font-weight: 800; color: var(--accent);"></span>
                        <small id="userRoleBadge" style="color: var(--text-dim); font-size: 10px; text-transform: uppercase;"></small>
                    </div>
                    <a href="dashboard.html" class="profile-trigger" title="Go to Dashboard">
                        <div class="profile-circle">
                            <i class="fa-solid fa-user-gear"></i>
                        </div>
                    </a>
                    <button onclick="logout()" class="btn-logout" title="Logout">
                        <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="section-title" style="text-align: center; margin-bottom: 50px;">
            <span style="color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Current Opportunities</span>
            <h2 style="font-size: clamp(2rem, 5vw, 3rem); margin-top: 10px;">Local <span>Job Requests</span></h2>
            <p id="statusText" style="color: var(--text-dim); margin-top: 15px; max-width: 600px; margin-inline: auto;">
                Bhopal ke sabhi naye kaam yahan ek jagah dekhein. Apne hunar ke hisaab se kaam chunin.
            </p>
        </div>

        <div class="filter-wrapper" style="display: flex; gap: 12px; margin-bottom: 40px; overflow-x: auto; padding: 10px 0; justify-content: center; scrollbar-width: none;">
            <button class="btn-glass active" style="white-space: nowrap;">All Jobs</button>
            <button class="btn-glass" style="white-space: nowrap;">Electrician</button>
            <button class="btn-glass" style="white-space: nowrap;">Plumber</button>
            <button class="btn-glass" style="white-space: nowrap;">Construction</button>
            <button class="btn-glass" style="white-space: nowrap;">Cleaning</button>
        </div>

        <div id="jobsFeed" class="jobs-grid">
            </div>
    </main>

    <footer>
        <div class="footer-content" style="text-align: center; padding: 60px 20px; border-top: 1px solid var(--glass-border);">
            <div class="footer-logo" style="font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 15px;">🧰 KaamgarConnect</div>
            <p style="color: var(--text-dim);">&copy; 2026 Byte Brain Team. Crafted by Prince Gupta.</p>
        </div>
    </footer>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM('loginModal')">&times;</span>
            <h3>Sign In</h3>
            <form id="loginForm">
                <input type="text" id="lId" placeholder="Mobile or Aadhaar" required>
                <input type="password" id="lPass" placeholder="Password" required>
                <button type="submit" class="btn-primary full">Login</button>
            </form>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM('regModal')">&times;</span>
            <h3>Join Now</h3>
            <form id="regForm">
                <input type="text" id="rName" placeholder="Full Name" required>
                <input type="text" id="rMob" placeholder="Mobile Number" required>
                <input type="text" id="rAad" placeholder="Aadhaar Number" required>
                <input type="password" id="rPass" placeholder="Password" required>
                <textarea id="rAddr" placeholder="Full Address"></textarea>
                <select id="rRole">
                    <option value="customer">Customer (Hire Worker)</option>
                    <option value="worker">Worker (Find Work)</option>
                </select>
                <button type="button" id="getLoc" class="btn-glass full">📍 Get Location</button>
                <p id="locStatus" style="font-size:12px; margin-top:5px;">Location Locked is safer</p>
                <button type="submit" class="btn-primary full" style="margin-top:15px;">Register</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
